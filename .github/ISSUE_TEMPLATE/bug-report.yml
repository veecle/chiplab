name: Report a bug
description: Something in Chiplab or this repo's examples didn't work as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this — it genuinely helps. Please 👍 existing reports to add weight rather than filing duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: What did you (or your agent) do? Include the example directory and commands if relevant.
      placeholder: |
        1. Built examples/bare-metal/stm32f4-discovery with `cargo build --release`
        2. Uploaded the ELF and ran it on stm32f4_discovery
        3. ...
    validations:
      required: true
  - type: input
    id: board
    attributes:
      label: Board / chip (if relevant)
      placeholder: stm32f4_discovery
  - type: input
    id: agent
    attributes:
      label: Agent client (if relevant)
      description: The MCP client you connected with.
      placeholder: Cursor, OpenCode, Claude Code, ...
  - type: textarea
    id: output
    attributes:
      label: Captured output / error
      description: Run output, error messages, or logs. Automatically formatted as code.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: OS, toolchain versions, or anything that might help us reproduce it.
