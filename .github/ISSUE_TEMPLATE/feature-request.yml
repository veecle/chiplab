name: Request a feature
description: Suggest an improvement to Chiplab or this repo's examples.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Requests really do shape the roadmap. Please 👍 existing requests to add weight rather than filing duplicates. For a new chip, OS/framework, or peripheral, use the dedicated request form instead.
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: The feature or change you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Workarounds or alternatives
      description: Anything you've tried or considered instead.
  - type: checkboxes
    id: help-test
    attributes:
      label: Willing to help test?
      options:
        - label: I can help test this once it's available.
